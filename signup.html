<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join MEIOSIS</title>
  <!-- PWA -->
  <meta name="theme-color" content="#0d1b2a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MEIOSIS" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Non-blocking font load: page renders immediately with system font, swaps when Outfit arrives -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" onload="this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      color: #f0f8ff;
      background:
        radial-gradient(ellipse at 70% 0%, rgba(82, 255, 157, 0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 100%, rgba(131, 212, 255, 0.07) 0%, transparent 45%),
        linear-gradient(175deg, #010e1c 0%, #041728 55%, #061e35 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Progress bar ──────────────────────────────────── */
    @keyframes ob-bar-shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    #ob-progress {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #2fcc77, #52ff9d, #2fcc77);
      border-radius: 0 3px 3px 0;
      transition: width 600ms cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 200;
      box-shadow: 0 0 14px rgba(82,255,157,0.6);
      overflow: hidden;
    }
    #ob-progress::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
      width: 30%;
      animation: ob-bar-shimmer 1.8s ease-in-out infinite;
      will-change: transform;
    }

    /* ── Top header ────────────────────────────────────── */
    #ob-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      pointer-events: none;
    }

    .ob-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      pointer-events: all;
    }

    .ob-brand-mark {
      width: 38px; height: 38px;
      display: grid; place-items: center;
      border-radius: 12px;
      background: #52ff9d;
      color: #04131f;
      font-size: 1rem; font-weight: 800;
      flex-shrink: 0;
    }

    .ob-brand-name {
      font-size: 0.95rem; font-weight: 700;
      color: #fff; letter-spacing: 0.06em;
    }

    #ob-step-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.38);
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    /* ── Main shell ─────────────────────────────────────── */
    #ob-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 112px;
    }

    /* ── Step container ─────────────────────────────────── */
    #ob-step-container {
      width: 100%;
      max-width: 580px;
      position: relative;
    }

    /* ── Animations ─────────────────────────────────────── */

    /* Enter: slide + subtle scale — children stagger opacity/rise */
    @keyframes ob-enter-fwd {
      0%   { transform: translateX(30px) scale(0.97); }
      100% { transform: translateX(0)    scale(1); }
    }
    @keyframes ob-enter-back {
      0%   { transform: translateX(-30px) scale(0.97); }
      100% { transform: translateX(0)     scale(1); }
    }

    /* Exit: snappy departure */
    @keyframes ob-exit-to-left {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(-22px) scale(0.95); }
    }
    @keyframes ob-exit-to-right {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(22px) scale(0.95); }
    }

    /* Children: fade + rise + micro spring-pop */
    @keyframes ob-child-rise {
      0%   { opacity: 0; transform: translateY(26px) scale(0.96); }
      62%  { opacity: 1; transform: translateY(-4px) scale(1.015); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Success screen: rises from below with spring */
    @keyframes ob-pop-in {
      0%   { opacity: 0; transform: scale(0.78) translateY(28px); }
      58%  { opacity: 1; transform: scale(1.04) translateY(-6px); }
      78%  { transform: scale(0.98) translateY(2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Success ring pulse */
    @keyframes ob-ring-pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(82,255,157,0.3), 0 0 0 0   rgba(82,255,157,0.15); }
      50%       { box-shadow: 0 0 0 10px rgba(82,255,157,0),  0 0 0 20px rgba(82,255,157,0); }
    }

    /* ── Enter classes ── */
    .ob-anim-fwd  { animation: ob-enter-fwd  0.38s cubic-bezier(0.22, 1, 0.36, 1) both; will-change: transform; }
    .ob-anim-back { animation: ob-enter-back 0.38s cubic-bezier(0.22, 1, 0.36, 1) both; will-change: transform; }
    .ob-anim-pop  { animation: ob-pop-in     0.54s cubic-bezier(0.34, 1.4, 0.64, 1) both; will-change: transform, opacity; }

    /* ── Exit classes ── */
    .ob-exit-left  { animation: ob-exit-to-left  0.19s cubic-bezier(0.4, 0, 1, 0.6) both; pointer-events: none; will-change: transform, opacity; }
    .ob-exit-right { animation: ob-exit-to-right 0.19s cubic-bezier(0.4, 0, 1, 0.6) both; pointer-events: none; will-change: transform, opacity; }

    /* ── Staggered children ── */
    .ob-anim-fwd > *, .ob-anim-back > * {
      animation: ob-child-rise 0.52s cubic-bezier(0.22, 1, 0.36, 1) both;
      will-change: transform, opacity;
    }
    .ob-anim-fwd > *:nth-child(1), .ob-anim-back > *:nth-child(1) { animation-delay: 0.05s; }
    .ob-anim-fwd > *:nth-child(2), .ob-anim-back > *:nth-child(2) { animation-delay: 0.13s; }
    .ob-anim-fwd > *:nth-child(3), .ob-anim-back > *:nth-child(3) { animation-delay: 0.20s; }
    .ob-anim-fwd > *:nth-child(4), .ob-anim-back > *:nth-child(4) { animation-delay: 0.26s; }
    .ob-anim-fwd > *:nth-child(5), .ob-anim-back > *:nth-child(5) { animation-delay: 0.31s; }

    /* ── Question block ─────────────────────────────────── */
    .ob-question { margin-bottom: 30px; }

    .ob-q-kicker {
      font-size: 0.75rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(82, 255, 157, 0.8);
      margin-bottom: 10px;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(82,255,157,0.4);
    }

    .ob-q-title {
      font-size: clamp(1.75rem, 4.5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 10px;
    }

    .ob-optional-tag {
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.08em;
      margin-left: 8px;
      vertical-align: middle;
    }

    .ob-q-sub {
      font-size: 0.93rem;
      color: rgba(255, 255, 255, 0.48);
      line-height: 1.6;
    }

    /* ── Text / email / number input ────────────────────── */
    .ob-input-wrap { position: relative; }

    @keyframes ob-input-bloom {
      from { box-shadow: 0 0 0 0px rgba(82,255,157,0.35); }
      to   { box-shadow: 0 0 0 4px rgba(82,255,157,0.12); }
    }

    .ob-input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.055);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      color: #fff;
      font: inherit;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 220ms, background 220ms, transform 280ms cubic-bezier(0.34,1.4,0.64,1);
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .ob-input::-webkit-outer-spin-button,
    .ob-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .ob-input:focus {
      border-color: rgba(82, 255, 157, 0.5);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
      animation: ob-input-bloom 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .ob-input.ob-err {
      border-color: rgba(255, 91, 91, 0.5);
      box-shadow: 0 0 0 4px rgba(255, 91, 91, 0.1);
    }

    .ob-input::placeholder { color: rgba(255, 255, 255, 0.25); }

    .ob-input.with-toggle { padding-right: 54px; }

    /* ── Password show / hide ───────────────────────────── */
    .ob-pw-toggle {
      position: absolute;
      right: 17px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255, 255, 255, 0.38);
      cursor: pointer; padding: 4px;
      display: grid; place-items: center;
      transition: color 150ms;
    }
    .ob-pw-toggle:hover { color: rgba(255, 255, 255, 0.75); }

    /* ── Password strength ──────────────────────────────── */
    .ob-pw-strength {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .ob-pw-bar {
      flex: 1; height: 4px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      transition: background 300ms;
    }
    .ob-pw-bar.weak   { background: #ff6b6b; }
    .ob-pw-bar.fair   { background: #ffc107; }
    .ob-pw-bar.good   { background: #7bddff; }
    .ob-pw-bar.strong { background: #52ff9d; }
    .ob-pw-hint {
      font-size: 0.79rem; color: rgba(255,255,255,0.4); margin-top: 7px;
    }

    /* ── Email availability badge ───────────────────────── */
    .ob-email-badge {
      display: none;
      align-items: center; gap: 7px;
      margin-top: 10px;
      font-size: 0.85rem; font-weight: 500;
    }
    .ob-email-badge .ob-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .ob-email-badge.checking { display: flex; color: #83d4ff; }
    .ob-email-badge.available { display: flex; color: #52ff9d; }
    .ob-email-badge.taken     { display: flex; color: #ff6b6b; }

    /* ── Chips (single select) ──────────────────────────── */
    .ob-chips {
      display: flex; flex-wrap: wrap; gap: 10px;
    }

    @keyframes ob-chip-snap {
      0%   { transform: scale(0.86); }
      55%  { transform: scale(1.10); }
      78%  { transform: scale(0.98); }
      100% { transform: scale(1.05); }
    }

    .ob-chip {
      padding: 11px 20px;
      border-radius: 999px;
      border: 1.5px solid rgba(255, 255, 255, 0.11);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.7);
      font: inherit; font-size: 0.93rem;
      cursor: pointer;
      transition: border-color 180ms, background 180ms, color 180ms, box-shadow 200ms,
                  transform 260ms cubic-bezier(0.34, 1.6, 0.64, 1);
    }

    .ob-chip:hover {
      border-color: rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #fff; transform: translateY(-3px) scale(1.04);
    }

    .ob-chip:active { transform: scale(0.86) !important; transition-duration: 60ms !important; }

    .ob-chip.sel-patient {
      border-color: rgba(82, 255, 157, 0.65);
      background: rgba(82, 255, 157, 0.14);
      color: #9bffca;
      box-shadow: 0 0 0 1px rgba(82,255,157,0.2), 0 6px 22px rgba(82,255,157,0.18);
      animation: ob-chip-snap 0.34s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .ob-chip.sel-doctor {
      border-color: rgba(131, 212, 255, 0.65);
      background: rgba(131, 212, 255, 0.14);
      color: #a9dfff;
      box-shadow: 0 0 0 1px rgba(131,212,255,0.2), 0 6px 22px rgba(131,212,255,0.18);
      animation: ob-chip-snap 0.34s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Role cards ─────────────────────────────────────── */
    .ob-role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @keyframes ob-card-select {
      0%   { transform: scale(0.96); }
      55%  { transform: scale(1.04); }
      80%  { transform: scale(1.01); }
      100% { transform: scale(1.025); }
    }

    .ob-role-card {
      padding: 34px 22px 28px;
      border-radius: 26px;
      border: 2px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      text-align: center;
      color: inherit; font: inherit;
      position: relative; overflow: hidden;
      transition: border-color 220ms, background 220ms,
                  transform 320ms cubic-bezier(0.34, 1.5, 0.64, 1),
                  box-shadow 320ms;
    }

    /* Shimmer sweep on hover */
    .ob-role-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.07) 50%, transparent 75%);
      transform: translateX(-120%) skewX(-8deg);
      transition: transform 0.55s ease;
      pointer-events: none;
    }
    .ob-role-card:hover::after { transform: translateX(140%) skewX(-8deg); }

    .ob-role-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-6px) scale(1.015);
      box-shadow: 0 16px 48px rgba(0,0,0,0.22);
    }

    .ob-role-card:active { transform: scale(0.95) !important; transition-duration: 70ms !important; }

    .ob-role-card.sel-patient {
      border-color: rgba(82, 255, 157, 0.65);
      background: rgba(82, 255, 157, 0.09);
      box-shadow: 0 0 0 1px rgba(82,255,157,0.25), 0 20px 60px rgba(82,255,157,0.18);
      animation: ob-card-select 0.38s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    .ob-role-card.sel-doctor {
      border-color: rgba(131, 212, 255, 0.65);
      background: rgba(131, 212, 255, 0.09);
      box-shadow: 0 0 0 1px rgba(131,212,255,0.25), 0 20px 60px rgba(131,212,255,0.18);
      animation: ob-card-select 0.38s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    .ob-role-icon { font-size: 2.8rem; line-height: 1; margin-bottom: 16px; }

    .ob-role-title {
      font-size: 1.1rem; font-weight: 700;
      color: #fff; margin-bottom: 8px;
    }

    .ob-role-desc {
      font-size: 0.83rem; color: rgba(255,255,255,0.48); line-height: 1.55;
    }

    /* ── Specialty search dropdown ──────────────────────── */
    .ob-dropdown-wrap { position: relative; }

    .ob-dropdown {
      position: absolute;
      top: calc(100% + 8px); left: 0; right: 0;
      background: #061e35;
      border: 1.5px solid rgba(255, 255, 255, 0.11);
      border-radius: 20px;
      overflow: hidden; z-index: 50;
      max-height: 260px; overflow-y: auto;
    }

    .ob-dropdown-item {
      padding: 13px 18px;
      cursor: pointer;
      font-size: 0.93rem; color: #c8d8e8;
      transition: background 130ms;
    }

    .ob-dropdown-item:hover,
    .ob-dropdown-item.kbd-focus {
      background: rgba(82, 255, 157, 0.09);
      color: #9bffca;
    }

    /* ── Error message ──────────────────────────────────── */
    .ob-error-msg {
      display: flex; align-items: center; gap: 10px;
      margin-top: 14px;
      padding: 13px 16px;
      border-radius: 16px;
      background: rgba(255, 91, 91, 0.09);
      border: 1px solid rgba(255, 91, 91, 0.18);
      color: #ffb0b0; font-size: 0.9rem;
    }

    /* ── Summary review ─────────────────────────────────── */
    .ob-summary { display: grid; gap: 10px; }

    .ob-summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 16px; gap: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.038);
      border: 1px solid rgba(255, 255, 255, 0.055);
    }

    .ob-summary-key {
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.38);
      flex-shrink: 0;
    }

    .ob-summary-val {
      font-size: 0.92rem; color: #e0f0ff; text-align: right;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Consent checkbox ───────────────────────────────── */
    .ob-consent-label {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px; margin-top: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      cursor: pointer;
    }

    .ob-consent-label input[type="checkbox"] {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px;
      accent-color: #52ff9d; cursor: pointer;
    }

    .ob-consent-text {
      font-size: 0.87rem; color: rgba(255,255,255,0.48); line-height: 1.6;
    }

    .ob-consent-text a { color: #83d4ff; text-decoration: none; }
    .ob-consent-text a:hover { text-decoration: underline; }

    /* ── Bottom nav bar ─────────────────────────────────── */
    #ob-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px 24px;
      background: linear-gradient(to top, #010e1c 55%, transparent 100%);
    }

    #ob-back {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 22px;
      border-radius: 999px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.65);
      font: inherit; font-size: 0.93rem;
      cursor: pointer;
      transition: border-color 160ms, background 160ms, color 160ms,
                  transform 220ms cubic-bezier(0.34, 1.5, 0.64, 1);
    }

    #ob-back:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transform: translateX(-5px);
    }

    #ob-back:active { transform: scale(0.94) !important; transition-duration: 70ms !important; }

    .ob-nav-right { display: flex; align-items: center; gap: 12px; }

    #ob-skip {
      background: none; border: none;
      color: rgba(255, 255, 255, 0.35);
      font: inherit; font-size: 0.88rem;
      cursor: pointer;
      text-decoration: underline;
      transition: color 150ms;
      padding: 8px 4px;
    }
    #ob-skip:hover { color: rgba(255, 255, 255, 0.65); }

    #ob-next {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      border-radius: 999px;
      border: 0;
      background: #52ff9d;
      color: #04131f;
      font: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 28px rgba(82,255,157,0.32);
      transition: transform 280ms cubic-bezier(0.34, 1.5, 0.64, 1),
                  box-shadow 280ms, background 220ms, opacity 220ms;
    }

    /* Shimmer sweep */
    #ob-next::before {
      content: '';
      position: absolute; top: 0; left: -80%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.36), transparent);
      transform: skewX(-18deg);
      transition: left 0.52s ease;
    }
    #ob-next:not(:disabled):hover::before { left: 140%; }

    #ob-next:not(:disabled):hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 48px rgba(82,255,157,0.48);
    }

    #ob-next:active { transform: scale(0.94) !important; transition-duration: 65ms !important; }

    #ob-next:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none !important; box-shadow: none;
    }

    #ob-next.mode-doctor {
      background: #83d4ff; color: #021220;
      box-shadow: 0 4px 28px rgba(131,212,255,0.32);
    }
    #ob-next.mode-doctor:not(:disabled):hover {
      box-shadow: 0 14px 48px rgba(131,212,255,0.48);
    }

    /* ── Spinner ────────────────────────────────────────── */
    @keyframes ob-spin { to { transform: rotate(360deg); } }

    .ob-spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(0, 0, 0, 0.2);
      border-top-color: #04131f;
      border-radius: 50%;
      animation: ob-spin 0.65s linear infinite;
    }

    .ob-spinner.light {
      border-color: rgba(255,255,255,0.2);
      border-top-color: #fff;
    }

    /* ── Success screen ─────────────────────────────────── */
    .ob-success {
      text-align: center;
      padding: 0 16px;
    }

    .ob-success-ring {
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(82, 255, 157, 0.12);
      border: 2px solid rgba(82, 255, 157, 0.35);
      display: flex; align-items: center; justify-content: center;

  <script>
'use strict';

const runtimeConfig = window.MEIOSIS_RUNTIME_CONFIG || {};
const API         = String(runtimeConfig.backendOrigin || 'http://localhost:5000').replace(/\/+$/, '') + '/api';
const SESSION_KEY = 'meiosis_auth_session_v1';
const LINKS_KEY   = 'meiosis_root_links_v1';
const DRAFT_KEY   = 'meiosis_signup_draft_v3';

const SPECIALTIES = [
  'General Medicine','General Surgery','Cardiology','Dermatology',
  'Endocrinology','Gastroenterology','Gynecology & Obstetrics',
  'Hematology','Nephrology','Neurology','Oncology','Ophthalmology',
  'Orthopedics','Otolaryngology (ENT)','Pediatrics','Psychiatry',
  'Pulmonology','Radiology','Rheumatology','Sports Medicine',
  'Urology','Anesthesiology','Emergency Medicine','Pathology'
];

const CONDITIONS = [
  'Hypertension','Type 2 Diabetes','Type 1 Diabetes','Asthma',
  'Heart Disease','Chronic Kidney Disease','Thyroid Disorder',
  'Arthritis','COPD','Depression / Anxiety','Migraine','Obesity',
  'Anemia','Epilepsy','High Cholesterol','Osteoporosis','Sleep Apnea'
];

const state = {
  role: null, stepIndex: 0, data: {},
  emailStatus: null, backendOnline: false,
  submitting: false, error: null,
};

const COMMON_STEPS = [
  { id:'role', type:'role-select' },
  { id:'name', type:'text', label:"What's your full name?", placeholder:'e.g. Rahul Sharma or Dr. Priya Nair', hint:'This appears on your prescriptions and patient records.', autocomplete:'name', required:true },
  { id:'email', type:'email', label:"What's your email address?", placeholder:'you@example.com', hint:"This is your login. We'll never spam you.", autocomplete:'email', required:true },
  // { id:'emailOtp', type:'email-otp', label:'Verify your email', hint:"Enter the 6-digit code we sent to your inbox.", required:true },
  { id:'password', type:'password', label:'Create a strong password', hint:'At least 8 characters. Mix letters, numbers, and symbols for best security.', required:true },
  { id:'confirmPassword', type:'confirm-password', label:'Confirm your password', hint:'Re-enter the password to make sure it matches.', required:true },
];

const PATIENT_STEPS = [
  { id:'dob', type:'date', label:'When were you born?', hint:'Helps doctors understand age-related health context.', optional:true },
  { id:'gender', type:'chips', label:'How do you identify?', hint:'Used for personalised health recommendations. Completely optional.', options:['Male','Female','Non-binary','Prefer not to say'], optional:true },
  { id:'bloodGroup', type:'chips', label:"What's your blood group?", hint:"Critical information for emergencies. Skip if you're unsure.", options:['A+','A\u2212','B+','B\u2212','AB+','AB\u2212','O+','O\u2212','Unknown'], optional:true },
  { id:'conditions', type:'multi-chips', label:'Any existing health conditions?', hint:'Helps your doctor prepare before your first visit. Select all that apply.', options:CONDITIONS, optional:true },
  { id:'emergencyContact', type:'text', label:'Who should we call in an emergency?', placeholder:'Name and phone number', hint:'Completely optional \u2014 you can add this later from your dashboard.', optional:true },
  { id:'phone', type:'phone', label:"What's your phone number?", hint:'For appointment reminders and critical health alerts.', required:true },
  // { id:'phoneOtp', type:'phone-otp', label:'Verify your number', required:true },
  { id:'consent', type:'final-patient' },
];

const DOCTOR_STEPS = [
  { id:'specialty', type:'search-select', label:'What is your medical specialization?', placeholder:'Search specialties...', hint:'Start typing to filter the list. Select your primary specialty.', options:SPECIALTIES, required:true },
  { id:'qualification', type:'text', label:'Your highest medical qualification?', placeholder:'MBBS, MD, DM, MS, DNB\u2026', hint:'Shown on prescriptions and your public doctor profile.', required:true },
  { id:'registrationNumber', type:'text', label:'Medical council registration number', placeholder:'State or national medical council reg. no.', hint:'Optional now \u2014 needed for full verification later.', optional:true },
  { id:'yearsExperience', type:'number', label:'Years of clinical experience?', placeholder:'e.g. 8', hint:'Total years of post-qualification clinical practice.', required:true },
  { id:'hospital', type:'text', label:'Hospital or clinic you practice at?', placeholder:'Apollo Hospital, Private Clinic, AIIMS\u2026', hint:'Your primary place of work shown to patients.', required:true },
  { id:'consultFee', type:'number', label:'Consultation fee (\u20b9)?', placeholder:'e.g. 800', hint:'The fee patients pay per consultation. You can update this anytime.', required:true },
  { id:'consultMode', type:'chips', label:'How do you see patients?', hint:'Choose your preferred consultation mode.', options:['In-person','Online','Both'], required:true },
  { id:'phone', type:'phone', label:"What's your phone number?", hint:'For patient alerts and critical clinic notifications.', required:true },
  // { id:'phoneOtp', type:'phone-otp', label:'Verify your number', required:true },
  { id:'agreement', type:'final-doctor' },
];

function getSteps() {
  if (!state.role) return COMMON_STEPS;
  return [...COMMON_STEPS, ...(state.role === 'DOCTOR' ? DOCTOR_STEPS : PATIENT_STEPS)];
}
function currentStep() { return getSteps()[state.stepIndex]; }
function totalSteps()  { return getSteps().length; }
function isFinalStep(s){ return s && (s.type === 'final-patient' || s.type === 'final-doctor'); }

function saveDraft() {
  try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify({role:state.role,stepIndex:state.stepIndex,data:state.data})); } catch(e){}
}
function loadDraft() {
  try {
    const raw = sessionStorage.getItem(DRAFT_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.role) state.role = d.role;
    if (typeof d.stepIndex === 'number') state.stepIndex = d.stepIndex;
    if (d.data && typeof d.data === 'object') state.data = d.data;
    const steps = getSteps();
    if (state.stepIndex >= steps.length) state.stepIndex = 0;
  } catch(e){}
}
function clearDraft() { try { sessionStorage.removeItem(DRAFT_KEY); } catch(e){} }

async function checkBackend() {
  try {
    const r = await fetch(API.replace('/api','') + '/health', {cache:'no-store'});
    state.backendOnline = r.ok;
  } catch(e) { state.backendOnline = false; }
}

let _emailDebounce = null;
async function checkEmailAvailability(email) {
  state.emailStatus = 'checking'; renderEmailBadge();
  try {
    const r = await fetch(API + '/auth/check-email?email=' + encodeURIComponent(email));
    if (!r.ok) { state.emailStatus = null; renderEmailBadge(); return; }
    const d = await r.json();
    state.emailStatus = d.available ? 'available' : 'taken';
  } catch(e) { state.emailStatus = null; }
  renderEmailBadge();
}
function renderEmailBadge() {
  const el = document.getElementById('ob-email-badge');
  if (!el) return;
  el.className = 'ob-email-badge';
  if (!state.emailStatus) { el.style.display = 'none'; return; }
  el.classList.add(state.emailStatus);
  const labels = { checking:'• Checking availability\u2026', available:'\u2713 Email is available', taken:'\u2715 Already registered \u2014 try logging in instead' };
  el.innerHTML = '<span class="ob-dot"></span>' + escHtml(labels[state.emailStatus] || '');
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return String(s == null ? '' : s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function iconEye() {
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function render(animClass) {
  if (animClass === undefined) animClass = 'ob-anim-fwd';
  if (window._otpCountdown) { clearInterval(window._otpCountdown); window._otpCountdown = null; }
  var step = currentStep();
  if (!step) { state.stepIndex = 0; step = currentStep(); }
  if (!step) return;
  var total = totalSteps();
  var pct = Math.round(((state.stepIndex + 1) / total) * 100);
  var isPatient = state.role === 'PATIENT';
  var isDoctor  = state.role === 'DOCTOR';
  var final = isFinalStep(step);

  var prog = document.getElementById('ob-progress');
  if (prog) prog.style.width = pct + '%';

  var lbl = document.getElementById('ob-step-label');
  if (lbl) lbl.textContent = state.stepIndex > 0 ? ('Step ' + state.stepIndex + ' of ' + (total - 1)) : '';

  var back = document.getElementById('ob-back');
  if (back) back.style.visibility = state.stepIndex > 0 ? 'visible' : 'hidden';

  var skip = document.getElementById('ob-skip');
  if (skip) skip.style.display = (step.optional && !final) ? 'inline' : 'none';

  var next = document.getElementById('ob-next');
  if (next) {
    next.classList.toggle('mode-doctor', isDoctor);
    next.disabled = state.submitting || (step.type === 'role-select' && !state.role) || step.type === 'email-otp' || step.type === 'phone-otp';
    if (state.submitting) {
      next.innerHTML = '<span class="ob-spinner"></span>';
    } else if (final) {
      next.textContent = 'Create Account \u2192';
    } else if (step.type === 'role-select') {
      next.textContent = state.role ? 'Continue \u2192' : 'Choose a role first';
    } else {
      next.textContent = 'Continue \u2192';
    }
  }

  var container = document.getElementById('ob-step-container');
  if (!container) return;

  var newWrapper = document.createElement('div');
  if (animClass) newWrapper.className = animClass;
  newWrapper.innerHTML = buildStepHTML(step, isPatient, isDoctor);

  var oldWrapper = container.firstElementChild;
  if (oldWrapper) {
    /* Exit: remove from flow so new content can set the container height */
    var exitClass = (animClass === 'ob-anim-back') ? 'ob-exit-right' : 'ob-exit-left';
    oldWrapper.style.cssText = 'position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:1;';
    container.style.position = 'relative';
    oldWrapper.className = exitClass;
    /* New content enters while old content exits */
    container.appendChild(newWrapper);
    /* Clean up old wrapper after exit animation (220ms + small buffer) */
    var _done = false;
    var _cleanup = function() {
      if (_done) return; _done = true;
      if (oldWrapper.parentNode) oldWrapper.parentNode.removeChild(oldWrapper);
      container.style.position = '';
    };
    oldWrapper.addEventListener('animationend', _cleanup, { once: true });
    setTimeout(_cleanup, 340);
  } else {
    container.appendChild(newWrapper);
  }

  attachStepBehaviour(step);
}

function attachStepBehaviour(step) {
  state.error = null;
  if (step.type === 'role-select') {
    document.querySelectorAll('.ob-role-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var role = card.getAttribute('data-role');
        var prevRole = state.role;
        state.role = role;
        if (prevRole && prevRole !== role) {
          var keep = ['name','email','password','confirmPassword'];
          var fresh = {};
          keep.forEach(function(k){ if (state.data[k]) fresh[k] = state.data[k]; });
          state.data = fresh;
        }
        document.querySelectorAll('.ob-role-card').forEach(function(c){ c.classList.remove('sel-patient','sel-doctor'); });
        card.classList.add(role === 'PATIENT' ? 'sel-patient' : 'sel-doctor');
        var next = document.getElementById('ob-next');
        if (next) { next.disabled = false; next.textContent = 'Continue \u2192'; next.classList.toggle('mode-doctor', role === 'DOCTOR'); }
        saveDraft();
      });
    });
    return;
  }

  var input = document.getElementById('ob-input');
  if (input) {
    setTimeout(function(){ input.focus(); }, 60);
    if (step.type !== 'date') {
      input.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); handleNext(); } });
    }
    input.addEventListener('input', function() {
      var raw = input.value;
      state.data[step.id] = (step.type === 'number' && raw !== '') ? Number(raw) : raw;
      saveDraft();
      if (step.type === 'email') scheduleEmailCheck(raw);
      if (step.type === 'password') updatePasswordStrength(raw);
    });
    if (step.type === 'date') {
      input.addEventListener('change', function(){ state.data[step.id] = input.value; saveDraft(); });
    }
  }

  var pwToggle = document.getElementById('ob-pw-toggle');
  if (pwToggle && input) {
    pwToggle.addEventListener('click', function(){ input.type = input.type === 'password' ? 'text' : 'password'; });
  }

  if (step.type === 'email') {
    var _esc = document.getElementById('ob-step-container');
    var _esw = (_esc && _esc.lastElementChild) || document;
    var _gBtn = _esw.querySelector('#ob-google-btn');
    var _aBtn = _esw.querySelector('#ob-apple-btn');
    if (_gBtn) _gBtn.addEventListener('click', function(){ handleSocialAuth('google'); });
    if (_aBtn) _aBtn.addEventListener('click', function(){ handleSocialAuth('apple'); });
  }

  if (step.type === 'chips') {
    var selClass = state.role === 'DOCTOR' ? 'sel-doctor' : 'sel-patient';
    document.querySelectorAll('#ob-chips .ob-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        document.querySelectorAll('#ob-chips .ob-chip').forEach(function(c){ c.classList.remove('sel-patient','sel-doctor'); });
        chip.classList.add(selClass);
        state.data[step.id] = chip.getAttribute('data-val');
        saveDraft();
      });
    });
  }

  if (step.type === 'multi-chips') {
    if (!Array.isArray(state.data[step.id])) state.data[step.id] = [];
    var mSelClass = state.role === 'DOCTOR' ? 'sel-doctor' : 'sel-patient';
    document.querySelectorAll('#ob-chips .ob-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        var v = chip.getAttribute('data-val');
        var arr = state.data[step.id];
        var idx = arr.indexOf(v);
        if (idx >= 0) { state.data[step.id] = arr.filter(function(x){ return x !== v; }); chip.classList.remove('sel-patient','sel-doctor'); }
        else { state.data[step.id] = arr.concat([v]); chip.classList.add(mSelClass); }
        saveDraft();
      });
    });
  }

  if (step.type === 'search-select' && input) {
    var dropdown = document.getElementById('ob-dropdown');
    var kbdIndex = -1;
    var showDropdown = function(query) {
      if (!dropdown) return;
      var q = query.trim().toLowerCase();
      var matches = q ? step.options.filter(function(o){ return o.toLowerCase().indexOf(q) >= 0; }).slice(0,12) : step.options.slice(0,10);
      if (!matches.length) { dropdown.style.display = 'none'; return; }
      dropdown.style.display = 'block';
      dropdown.innerHTML = matches.map(function(m,i){ return '<div class="ob-dropdown-item" data-val="' + escAttr(m) + '" data-idx="' + i + '">' + escHtml(m) + '</div>'; }).join('');
      kbdIndex = -1;
      dropdown.querySelectorAll('.ob-dropdown-item').forEach(function(item) {
        item.addEventListener('mousedown', function(e){ e.preventDefault(); selectSpecialty(item.getAttribute('data-val')); });
      });
    };
    var selectSpecialty = function(v) {
      input.value = v; state.data[step.id] = v; dropdown.style.display = 'none'; kbdIndex = -1; saveDraft();
    };
    var updateKbdFocus = function(items) {
      items.forEach(function(el,i){ el.classList.toggle('kbd-focus', i === kbdIndex); });
      if (items[kbdIndex]) items[kbdIndex].scrollIntoView({block:'nearest'});
    };
    input.addEventListener('focus', function(){ showDropdown(input.value); });
    input.addEventListener('input', function(){ state.data[step.id] = input.value; showDropdown(input.value); saveDraft(); });
    input.addEventListener('blur', function(){ setTimeout(function(){ if(dropdown) dropdown.style.display = 'none'; }, 200); });
    input.addEventListener('keydown', function(e) {
      var items = dropdown ? dropdown.querySelectorAll('.ob-dropdown-item') : [];
      if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); kbdIndex = Math.min(kbdIndex+1, items.length-1); updateKbdFocus(items); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); kbdIndex = Math.max(kbdIndex-1, 0); updateKbdFocus(items); }
      else if (e.key === 'Enter' && kbdIndex >= 0) { e.preventDefault(); selectSpecialty(items[kbdIndex].getAttribute('data-val')); }
    });
  }

  if (step.type === 'phone') {
    var _psc = document.getElementById('ob-step-container');
    var _psw = (_psc && _psc.lastElementChild) || document;
    var phoneField = _psw.querySelector('#ob-phone-field');
    var phoneWrap  = _psw.querySelector('#ob-phone-wrap');
    if (phoneField) {
      setTimeout(function(){ phoneField.focus(); }, 60);
      phoneField.addEventListener('input', function() {
        var digits = phoneField.value.replace(/\D/g,'').slice(0,10);
        phoneField.value = digits;
        state.data.phone = digits;
        if (phoneWrap) phoneWrap.classList.remove('ob-err');
        saveDraft();
      });
      phoneField.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); handleNext(); } });
    }
  }

  if (step.type === 'phone-otp') {
    var isDoc = state.role === 'DOCTOR';
    var _sc = document.getElementById('ob-step-container');

function updatePasswordStrength(pw) {
  var score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/\d/.test(pw) || /[^a-zA-Z0-9]/.test(pw)) score++;
  var levelClass = ['','weak','weak','fair','good','strong'][Math.min(score+1,5)];
  var labels = ['Choose a password to get started','Too short \u2014 add more characters','Weak \u2014 try mixing letters and numbers','Fair \u2014 add uppercase letters','Good \u2014 getting stronger!','Strong password \u2713'];
  for (var i = 1; i <= 4; i++) {
    var bar = document.getElementById('ob-bar-' + i);
    if (bar) { bar.className = 'ob-pw-bar'; if (i <= score) bar.classList.add(levelClass); }
  }
  var hint = document.getElementById('ob-pw-hint');
  if (hint) hint.textContent = labels[score] || '';
}

function validateStep() {
  var step = currentStep();
  state.error = null;
  if (step.type === 'role-select') { if (!state.role) { state.error = 'Please choose a role to continue.'; return false; } return true; }
  if (step.optional) return true;
  if (step.type === 'final-patient') { if (!state.data.consent) { state.error = 'Please agree to the Terms of Service to create your account.'; return false; } return true; }
  if (step.type === 'final-doctor')  { if (!state.data.agreement) { state.error = 'Please agree to the Terms of Service to create your account.'; return false; } return true; }
  if (step.type === 'phone') {
    var digits = String(state.data.phone || '').replace(/\D/g,'').slice(-10);
    if (digits.length !== 10) { state.error = 'Please enter a valid 10-digit mobile number.'; var w = document.getElementById('ob-phone-wrap'); if (w) w.classList.add('ob-err'); return false; }
    if (!/^[6-9]\d{9}$/.test(digits)) { state.error = 'Indian mobile numbers start with 6, 7, 8, or 9.'; var w2 = document.getElementById('ob-phone-wrap'); if (w2) w2.classList.add('ob-err'); return false; }
    return true;
  }
  if (step.type === 'email-otp') {
    if (!state.data.emailVerified) { state.error = 'Please enter the 6-digit code sent to your email.'; return false; }
    return true;
  }
  if (step.type === 'phone-otp') {
    var code = String(state.data.phoneOtp || '');
    if (code.length < 6) { state.error = 'Please enter the complete 6-digit code.'; return false; }
    if (code !== '123456') {
      state.error = 'Incorrect code \u2014 the demo OTP is 123456.';
      var grp = document.getElementById('ob-otp-group');
      if (grp) { grp.classList.remove('shake'); void grp.offsetWidth; grp.classList.add('shake'); grp.addEventListener('animationend', function(){ grp.classList.remove('shake'); }, {once:true}); }
      return false;
    }
    return true;
  }
  var val = state.data[step.id];
  var str = String(val != null ? val : '').trim();
  if (step.required && !str) { state.error = (step.label ? step.label.replace(/[?!.]/g,'').trim() : step.id) + ' is required.'; markInputError(); return false; }
  if (step.type === 'email') {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str)) { state.error = 'Please enter a valid email address.'; markInputError(); return false; }
    if (state.emailStatus === 'taken') { state.error = 'This email is already registered. Please log in instead.'; markInputError(); return false; }
    if (state.emailStatus === 'checking') { state.error = 'Checking email availability \u2014 please wait a moment.'; return false; }
  }
  if (step.type === 'password' && str.length < 8) { state.error = 'Password must be at least 8 characters long.'; markInputError(); return false; }
  if (step.type === 'confirm-password' && str !== String(state.data.password || '')) { state.error = "Passwords don't match. Please check and try again."; markInputError(); return false; }
  if (step.type === 'search-select' && step.required && step.options.indexOf(str) < 0) { state.error = 'Please select a valid option from the list.'; markInputError(); return false; }
  if (step.type === 'chips' && step.required && !state.data[step.id]) { state.error = 'Please select one of the options above.'; return false; }
  if (step.type === 'number' && step.required && (isNaN(Number(val)) || Number(val) < 0)) { state.error = 'Please enter a valid number.'; markInputError(); return false; }
  return true;
}

function collectCurrentInput() {
  var step = currentStep();
  if (step.type === 'phone') {
    var pf = document.getElementById('ob-phone-field');

  if (step.type === 'email-otp') return; // managed live in attachStepBehaviour
  if (step.type === 'phone-otp') return; // managed live in attachStepBehaviour
  var input = document.getElementById('ob-input');
  if (!input) return;
  var raw = input.value;
  state.data[step.id] = (step.type === 'number' && raw !== '') ? Number(raw) : raw;

      options: { redirectTo: window.location.href.split('#')[0] }
    });
  } catch(err) {
    sessionStorage.removeItem('meiosis_oauth_pending');
    state.error = err.message || 'Authentication failed. Please try again.';
    render('ob-anim-fwd');
  }
}

async function sendEmailOtp() {
  var email = String(state.data.email || '').trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    state.error = 'Please enter a valid email address.'; render('ob-anim-fwd'); return;
  }
  if (state.emailStatus === 'taken') {
    state.error = 'This email is already registered. Please log in instead.'; render('ob-anim-fwd'); return;
  }
  if (state.emailStatus === 'checking') {
    state.error = 'Checking email availability \u2014 please wait a moment.'; render('ob-anim-fwd'); return;
  }
  if (!window._supabase) {
    state.error = 'Supabase is not configured. Add your credentials to the script block.'; render('ob-anim-fwd'); return;
  }
  state.submitting = true; state.error = null; render('ob-anim-fwd');
  try {
    var result = await window._supabase.auth.signInWithOtp({ email: email, options: { shouldCreateUser: true } });
    if (result.error) throw result.error;
    state.submitting = false;
    state.data.emailVerified = false;
    state.stepIndex++; saveDraft(); render('ob-anim-fwd');
  } catch(err) {
    state.submitting = false;
    state.error = err.message || 'Failed to send verification code. Please try again.';
    render('ob-anim-fwd');
  }
}

var _oauthSkipTypes = { 'email': true, 'email-otp': true, 'password': true, 'confirm-password': true };

function handleNext() {
  if (state.submitting) return;
  collectCurrentInput();
  var step = currentStep();
  if (step.type === 'email' && !state.data.isOAuthUser) { sendEmailOtp(); return; }
  if (!validateStep()) { render('ob-anim-fwd'); return; }
  if (isFinalStep(step)) { submitSignup(); return; }
  state.stepIndex++;
  // OAuth users: auto-skip email / OTP / password steps
  if (state.data.isOAuthUser) {
    while (state.stepIndex < totalSteps() && _oauthSkipTypes[currentStep().type]) state.stepIndex++;
  }
  saveDraft(); render('ob-anim-fwd');
}
function handleBack() {
  if (state.stepIndex === 0) return;
  state.error = null;
  var leaving = currentStep();
  if (leaving && leaving.type === 'email-otp') { state.data.emailOtp = ''; state.data.emailVerified = false; }
  if (leaving && leaving.type === 'phone-otp') { state.data.phoneOtp = ''; }
  state.stepIndex--;
  // OAuth users: auto-skip backwards over email / OTP / password steps
  if (state.data.isOAuthUser) {
    while (state.stepIndex > 0 && _oauthSkipTypes[currentStep().type]) state.stepIndex--;
  }
  render('ob-anim-back');
}
function handleSkip() {
  var step = currentStep();
  state.data[step.id] = step.type === 'multi-chips' ? [] : '';
  state.error = null; state.stepIndex++; saveDraft(); render('ob-anim-fwd');
}

async function submitSignup() {
  if (state.submitting) return;
  if (!state.backendOnline) {
    state.error = 'Cannot reach the backend server. Make sure it is running (cd backend && npm run dev), then try again.';
    render('ob-anim-fwd'); return;
  }
  state.submitting = true; state.error = null; render('ob-anim-fwd');
  var d = state.data;
  var payload = {
    role: state.role,
    name: String(d.name || '').trim(),
    email: String(d.email || '').trim().toLowerCase(),
    password: String(d.password || ''),
    phone: d.phone ? ('+91' + String(d.phone).replace(/\D/g,'').slice(-10)) : '',
    bloodGroup: d.bloodGroup || '',
    emergencyContact: d.emergencyContact || '',
    insurancePlan: (Array.isArray(d.conditions) && d.conditions.length) ? d.conditions.join(', ') : '',
    healthGoal: [d.dob ? 'DOB: ' + d.dob : '', d.gender ? 'Gender: ' + d.gender : ''].filter(Boolean).join(' | ') || '',
    address: '',
    specialty: d.specialty || '',
    qualification: d.qualification || '',
    registrationNumber: d.registrationNumber || '',
    yearsExperience: d.yearsExperience || 0,
    hospital: d.hospital || '',
    consultFee: d.consultFee || 0,
    clinicAddress: d.consultMode ? 'Consultation mode: ' + d.consultMode : '',
  };
  try {
    var res = await fetch(API + '/auth/signup', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    var text = await res.text();
    var data = text ? JSON.parse(text) : null;
    if (!res.ok) throw new Error(data && data.error ? data.error : 'Server error ' + res.status + '.');
    localStorage.setItem(SESSION_KEY, JSON.stringify(Object.assign({}, data.user, {savedAt: new Date().toISOString()})));
    localStorage.setItem(LINKS_KEY, JSON.stringify({login: new URL('./login.html', location.href).href, signup: new URL('./signup.html', location.href).href, patient: new URL('./patient.html', location.href).href, doctorLaunch: new URL('./doctor-launch.html', location.href).href}));
    state.submitting = false;
    renderSuccess(data.user);
  } catch(err) {
    state.submitting = false;
    state.error = err.message || 'Something went wrong. Please try again.';
    render('ob-anim-fwd');
  }
}

async function doRedirect(role) {
  if (role === 'DOCTOR') {
    var doctorFrontendUrl = String(
      (window.MEIOSIS_RUNTIME_CONFIG && window.MEIOSIS_RUNTIME_CONFIG.doctorFrontendUrl) ||
      'http://localhost:5173'
    ).replace(/\/+$/, '');
    try { await fetch(doctorFrontendUrl, {method:'GET',mode:'no-cors',cache:'no-store'}); location.href = doctorFrontendUrl + '/'; return; } catch(e){}
    location.href = new URL('./doctor-launch.html', location.href).href; return;
  }
  location.href = new URL('./meiosis-setup.html', location.href).href;
}
window.doRedirect = doRedirect;

async function boot() {
  loadDraft();

  // Detect OAuth callback (Google / Apple redirect back to this page)
  if (window._supabase && sessionStorage.getItem('meiosis_oauth_pending')) {
    sessionStorage.removeItem('meiosis_oauth_pending');
    try {
      var _sr = await window._supabase.auth.getSession();
      if (_sr.data && _sr.data.session) {
        var _ou = _sr.data.session.user;
        var _op = (_ou.app_metadata || {}).provider;
        if (_op && _op !== 'email') {
          var _om = _ou.user_metadata || {};
          state.data.email    = _ou.email || '';
          state.data.name     = state.data.name || _om.full_name || _om.name || '';
          state.data.emailVerified = true;
          state.data.isOAuthUser   = true;
          // Generate random password — user will always sign in via OAuth
          state.data.password = state.data.confirmPassword =
            btoa(Math.random().toString(36) + Date.now()).slice(0, 20);
          if (!state.role) state.stepIndex = 0;
          saveDraft();
        }
      }
    } catch(e) {}
  }

  var next = document.getElementById('ob-next');
  var back = document.getElementById('ob-back');
  var skip = document.getElementById('ob-skip');
  if (next) next.addEventListener('click', handleNext);
  if (back) back.addEventListener('click', handleBack);
  if (skip) skip.addEventListener('click', handleSkip);
  checkBackend();
  render('ob-anim-fwd');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      }).catch(() => {});
    }
  </script>
